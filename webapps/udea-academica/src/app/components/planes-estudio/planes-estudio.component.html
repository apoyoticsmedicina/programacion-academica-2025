<div class="planes">

  <!-- Header con botón a la derecha -->
  <div class="planes__header">
    <!-- Dale la clase planes__title para el título -->
    <h2 class="planes__title">Planes de Estudio</h2>
    <!-- Cambia planes__add por planes__add-btn -->
    <button class="planes__add-btn" (click)="openModal()">
      + Nuevo Plan
    </button>
  </div>

  <ul class="planes__list">
    <li class="planes__empty" *ngIf="planes.length === 0">
      No hay planes de estudio registrados.
    </li>

    <li class="planes__item" *ngFor="let pl of planes">
      <div class="planes__info">
        {{ getProgramaNombre(pl.programaId) }}
        — <em>v{{ pl.version }}</em>
        <span *ngIf="!pl.activo" class="planes__inactive">
          (inactivo)
        </span>
      </div>
      <button class="planes__edit" (click)="openModal(pl)">
        ✎
      </button>
    </li>
  </ul>

  <div class="planes__backdrop" *ngIf="showModal">
    <div class="planes__modal">
      <h3>
        {{ editingPlan
           ? 'Editar Plan (v' + editingPlan.version + ')'
           : 'Crear Plan de Estudio' }}
      </h3>
      <form [formGroup]="form" (ngSubmit)="submit()">
        <label>
          Programa:
          <select formControlName="programaId">
            <option [ngValue]="null">— Seleccione —</option>
            <option *ngFor="let pr of programas" [ngValue]="pr.id">
              {{ pr.nombre }} ({{ pr.tipo }})
            </option>
          </select>
        </label>

        <label>
          Versión:
          <input type="text" formControlName="version" />
        </label>

        <div class="planes__modal-buttons">
          <button type="button" (click)="closeModal()">Cancelar</button>
          <button type="submit" [disabled]="form.invalid">
            {{ editingPlan
               ? 'Guardar y Desactivar Antiguo'
               : 'Crear' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
