<!-- src/app/components/cursos/cursos.component.html -->

<div class="cursos">
  <div class="cursos__actions">
    <button class="cursos__add-btn" (click)="openModal()">
      + Agregar Curso
    </button>
    <button class="cursos__link-btn" (click)="openLinkModal()">
      ↔ Vincular a Plan
    </button>
  </div>

  <ul class="cursos__list">
    <li *ngFor="let c of cursos" class="cursos__item">
      <div class="cursos__info">
        <strong>{{ c.codigo }}</strong> — {{ c.nombre }}
        <em>({{ c.nivel }})</em>
        <span *ngIf="!c.habilitado" class="badge inactivo">Inhabilitado</span>
      </div>
      <div class="cursos__meta">
        HTI: {{ c.HTI }} — HTC: {{ c.HTC }} — HTE: {{ c.HTE }}
      </div>
    </li>
  </ul>

  <div class="modal-backdrop" *ngIf="showModal">
    <div class="modal cursos__modal">
      <h2>Crear Curso</h2>
      <form [formGroup]="form" (ngSubmit)="submit()">
        <label>
          Código
          <input formControlName="codigo" />
        </label>

        <label>
          Nombre
          <input formControlName="nombre" />
        </label>

        <label>
          Nivel
          <input formControlName="nivel" />
        </label>

        <label>
          <input type="checkbox" formControlName="habilitado" />
          Habilitado
        </label>

        <label>
          HTI
          <input type="number" formControlName="HTI" />
        </label>

        <label>
          HTC
          <input type="number" formControlName="HTC" />
        </label>

        <label>
          HTE
          <input type="number" formControlName="HTE" />
        </label>

        <div class="modal__actions">
          <button type="button" (click)="closeModal()">Cancelar</button>
          <button type="submit" [disabled]="form.invalid">Crear</button>
        </div>
      </form>
    </div>
  </div>
  <div class="modal-backdrop" *ngIf="showLink">
    <div class="modal cursos__link-modal">
      <h2>Vincular Curso a Plan de Estudio</h2>
      <form [formGroup]="linkForm" (ngSubmit)="submitLink()">
        <label>
          Curso:
          <select formControlName="cursoId">
            <option [ngValue]="null">— Seleccione —</option>
            <option *ngFor="let c of cursos" [ngValue]="c.id">
              {{ c.codigo }} — {{ c.nombre }}
            </option>
          </select>
        </label>

        <label>
          Plan de Estudio:
          <select formControlName="planEstudioId">
            <option [ngValue]="null">— Seleccione —</option>
            <option *ngFor="let p of planes" [ngValue]="p.id">
              {{ p.version }} ({{ getProgramaNombre(p.programaId) }})
            </option>
          </select>
        </label>

        <!-- Nuevo campo: ¿Será Electiva dentro de este Plan? -->
        <label>
          <input type="checkbox" formControlName="esElectiva" />
          ¿Electiva en este Plan?
        </label>

        <!-- Nuevo campo: Orden de aparición en el Plan -->
        <label>
          Orden:
          <input
            type="number"
            formControlName="orden"
            min="1"
            placeholder="1"
          />
        </label>

        <div class="modal__actions">
          <button type="button" (click)="closeLinkModal()">Cancelar</button>
          <button type="submit" [disabled]="linkForm.invalid">Vincular</button>
        </div>
      </form>
    </div>
  </div>
</div>
