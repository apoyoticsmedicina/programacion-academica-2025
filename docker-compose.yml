services:
  db:
    image: postgres:16-alpine
    container_name: udea-db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER} -d ${DB_NAME} -h 127.0.0.1 -p 5432",
        ]
      interval: 3s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./services/academica
      dockerfile: Dockerfile
    container_name: udea-backend
    environment:
      NODE_ENV: ${NODE_ENV}
      APP_ENV: ${APP_ENV}
      ALLOW_DEV_LOGIN: ${ALLOW_DEV_LOGIN}
      DEV_LOGIN_KEY: ${DEV_LOGIN_KEY}

      BACKEND_PORT: ${BACKEND_PORT}

      DB_CONNECTION: ${DB_CONNECTION}
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME}
      DB_AUTO_MIGRATE: ${DB_AUTO_MIGRATE}

      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}

      FRONTEND_URL: ${FRONTEND_URL}

      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      AUTH_ALLOWED_DOMAIN: ${AUTH_ALLOWED_DOMAIN}

      PAGINATION_DEFAULT_PAGE_SIZE: ${PAGINATION_DEFAULT_PAGE_SIZE}
      PAGINATION_MAX_PAGE_SIZE: ${PAGINATION_MAX_PAGE_SIZE}

      DOCX_PROGRAMA_TEMPLATE_PATH: ${DOCX_PROGRAMA_TEMPLATE_PATH}
      DOCX_PROGRAMA_TEMPLATE_WATCH: ${DOCX_PROGRAMA_TEMPLATE_WATCH}
      DOCX_PROGRAMA_ALLOW_DEBUG: ${DOCX_PROGRAMA_ALLOW_DEBUG}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT}:3000"

  frontend:
    build:
      context: ./webapps/udea-academica
      dockerfile: Dockerfile
      args:
        BUILD_CONFIG: production
    container_name: udea-frontend
    depends_on:
      - backend
    ports:
      - "4200:80"
    # El navegador del host sigue llamando al backend en http://localhost:3000

volumes:
  pgdata:
